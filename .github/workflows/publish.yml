name: Publish to PyPI

# Publishes any Python package in the monorepo when release-please creates its
# release tag. Covers cli-web-core, cli-web-devkit, every generated CLI
# (cli-web-<app>-vX.Y.Z), and the cli-anything-web umbrella
# (cli-anything-web-meta-vX.Y.Z).
#
# The package directory is resolved generically from release-please-config.json
# (component -> path), so adding a new CLI needs no change here.
#
# Auth: a single account-scoped PyPI API token stored as the PYPI_API_TOKEN
# secret on the "pypi" environment (see docs/PUBLISHING.md) — one secret
# covers every package.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    # Only Python packages: every one is tagged with a "cli-web-" prefix, plus
    # the umbrella. The plugin/workspace release (tag "vX.Y.Z") is excluded.
    if: startsWith(github.event.release.tag_name, 'cli-web-') || startsWith(github.event.release.tag_name, 'cli-anything-web-meta-')
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve package directory from release-please config
        id: pkg
        run: |
          TAG="${{ github.event.release.tag_name }}"
          COMPONENT="${TAG%-v*}"   # cli-web-futbin-v0.1.1 -> cli-web-futbin
          DIR=$(jq -r --arg c "$COMPONENT" \
            '.packages | to_entries[] | select(.value.component == $c) | .key' \
            release-please-config.json)
          if [ -z "$DIR" ]; then
            echo "::error::No package with component '$COMPONENT' in release-please-config.json"
            exit 1
          fi
          echo "Resolved $TAG -> $DIR"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Build distribution
        run: |
          pip install build
          python -m build "${{ steps.pkg.outputs.dir }}" --outdir dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
